name: CI

on:
  push:
    branches: [main]   # PR branches are covered by the pull_request trigger
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      # The core pipeline + tests are stdlib-only, so there's nothing to install.
      - name: Compile all scripts
        run: python -m compileall -q scripts tests
      - name: Run the pipeline regression suite
        run: python tests/test_pipeline.py
      - name: Run the connector regression suite
        run: python tests/test_connectors.py
      - name: End-to-end smoke on the bundled sample
        run: |
          python scripts/format/normalize.py examples/sample_messages.jsonl --dedup -o /tmp/clean.jsonl
          python scripts/format/pii_scrub.py /tmp/clean.jsonl -o /tmp/scrubbed.jsonl
          python scripts/persona/style_analyze.py /tmp/scrubbed.jsonl --name Sam -o /tmp/persona
          python scripts/format/build_dataset.py /tmp/scrubbed.jsonl --format openai-chat \
            --system-file /tmp/persona/style_card.md --holdout 0.1 -o /tmp/train.jsonl
          test -s /tmp/train.jsonl
          test -f /tmp/persona/style_card.md

  lint:
    # Hard gate: the codebase is ruff-check clean. Pinned so a new ruff release
    # can't break CI; bump deliberately alongside a `ruff check` run.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - name: Ruff lint
        run: pipx run ruff==0.15.8 check scripts tests
