# Run `pre-commit install` once, then ruff lints on every commit.
# Install: pip install pre-commit  (or pipx install pre-commit)
# Keep `rev` in step with the ruff version pinned in .github/workflows/ci.yml.
# (No ruff-format hook: the codebase is check-clean but not format-clean, and
# CI gates on `ruff check` only. `make fmt` formats on demand.)
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
